name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy backend + frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build --template infrastructure/template.yaml

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name rr-cloudtasks-app \
            --s3-bucket ${{ secrets.SAM_ARTIFACTS_BUCKET }} \
            --s3-prefix rr-cloudtasks \
            --region us-east-1 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides Stage=prod

      - name: Read SAM stack outputs
        id: stack
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name rr-cloudtasks-app \
            --region us-east-1 \
            --query "Stacks[0].Outputs" \
            --output json)
          get_output() {
            echo "$OUTPUTS" | jq -r --arg k "$1" '.[] | select(.OutputKey==$k) | .OutputValue'
          }
          echo "api_url=$(get_output ApiUrl)" >> $GITHUB_OUTPUT
          echo "user_pool_id=$(get_output UserPoolId)" >> $GITHUB_OUTPUT
          echo "user_pool_client_id=$(get_output UserPoolClientId)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(get_output FrontendBucket)" >> $GITHUB_OUTPUT
          echo "cf_distribution_id=$(get_output CloudFrontDistributionId)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(get_output FrontendUrl)" >> $GITHUB_OUTPUT

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_LOCAL_DEV: "false"
          VITE_API_URL: ${{ steps.stack.outputs.api_url }}
          VITE_USER_POOL_ID: ${{ steps.stack.outputs.user_pool_id }}
          VITE_USER_POOL_CLIENT_ID: ${{ steps.stack.outputs.user_pool_client_id }}

      - name: Sync frontend to S3
        run: |
          # Hashed assets (immutable, long cache)
          aws s3 sync frontend/dist s3://${{ steps.stack.outputs.frontend_bucket }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          # index.html (no cache so deploys are visible immediately)
          aws s3 cp frontend/dist/index.html \
            s3://${{ steps.stack.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.cf_distribution_id }} \
            --paths "/*"

      - name: Print frontend URL
        run: 'echo "🚀 Frontend deployed to: ${{ steps.stack.outputs.frontend_url }}"'
